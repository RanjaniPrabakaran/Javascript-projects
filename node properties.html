<!DOCTYPE html>
<html>
    <head>
        <title>node properties</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="p-4">
        <h3 id="heading">Hello Prabakaran</h3>
        <p id="para">this is a paragraph</p>
        <button class="btn btn-primary mt-3" onclick="showprop()">show node properties</button>
        <div id="output" class="mt-3"></div>
    <script>
        function showprop() {
            let element = document.getElementById("heading");

            let result="";

            result += "node name:" + element.nodeName + "<br>"
            result += "node type:" + element.nodeType + "<br>"
            result += "node value:" + element.nodeValue + "<br>"
            result += "textcontent:" + element.textContent + "<br>"
            result += "innerHTML:" + element.innerHTML + "<br>"
            result += "outerhtml:" + element.outerHTML + "<br>"

            document.getElementById("output").innerHTML=result;
        }
    </script>
    </body>
</html>
