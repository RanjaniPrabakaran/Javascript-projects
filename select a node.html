<!DOCTYPE html>
<html>
    <head>
        <title>select a particular node </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="p-4">

        <h3>Print Particular Node Item</h3>
        <h4 id="title">Welcome to JavaScript</h4>
        <p id="desc">this is a paragraph node</p>

        <button class="btn btn-primary me-3" onclick="show('title')">show title node</button>
        <button class="btn btn-success me-3 " onclick="show('desc')">show paragraph node</button>
        <button class="btn btn-info" onclick="show()">click me</button>

        <div id="result" class="mt-3"></div>

        <script>
            function show(id) {
                let element=document.getElementById(id);

                if(!element) {
                    document.getElementById("result").innerText="node not found";
                    return;
                }
                let message="";

               message += "selected Node ID:" +id+"<br>";
               message += "node name:" + element.nodeName+"<br>";
               message += "node type:" + element.nodeType+"<br>";
               message += "content:" + element.textContent+"<br>";

                document.getElementById("result").innerHTML= message;

            }
        </script>
        </body>
</html>
