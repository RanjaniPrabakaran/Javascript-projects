<!DOCTYPE html>
<html>
    <head>
        <title>compare 2 strings</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="p-5">
<h3>Comparing strings</h3>

<input type="text" id=str1 class="form-control mt-3 w-25" placeholder="enter string 1">
<input type="text" id=str2 class="form-control mt-3 w-25" placeholder="enter string 2">
<button class="btn btn-primary mt-3" onclick="compare()">compare</button>
<p id="result" class="mt-3"></p>

<script>
    function compare() {

    let s1=document.getElementById("str1").value;
    let s2=document.getElementById("str2").value;
    
    if(s1.trim()===("")||s2.trim()===("")){
        document.getElementById("result").innerText="enter both strings";
        return;
    }

    if(s1 === s2) {
        document.getElementById("result").innerText="both strings are equal";
    } else {
        document.getElementById("result").innerText="both strings are not equal";
    }
}
</script>
</body>
</html>
