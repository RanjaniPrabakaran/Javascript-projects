<!DOCTYPE html>
<html>
    <head>
        <title>javascript example2</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="p-4">

    <h3>Basic arithmetic function</h3>

    <input type="number" id="num1" class="form-control w-25 mb-3" placeholder="first number">
    <input type="number" id="num2" class="form-control w-25 mb-3" placeholder="second number">

    <button class="btn btn-primary me-2" onclick="calculate('add')">addition</button>
    <button class="btn btn-success me-2" onclick="calculate('sub')">subtraction</button>
    <button class="btn btn-danger me-2" onclick="calculate('mul')">multiply</button>
    <button class="btn btn-info me-2" onclick="calculate('div')">divison</button>
    <button class="btn btn-primary me-2" onclick="resetFields()">reset</button>

    <p id="result" class="mt-3"></p>

    <script>
        function calculate(operation)  {

            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);

            if(isNaN(a) || isNaN(b))  { 

                document.getElementById("result").innerText = "enter a valid number";
                return;
            }

            let result;

            if( operation === 'add') {
               
                result = a + b;
            }
             else if(operation === 'sub') {

                result = a - b;
             } else if(operation === 'mul') {

                result = a * b;
             } else if(operation === 'div') {
                
                if( b === 0){
                   
                    document.getElementById("result").innerText = "cannot divide by zero";
                    return;
                } 
                 result = a / b;
             }   
             document.getElementById("result").innerText = "result : " + result;

        }

        function resetFields() {
            document.getElementById("num1").value = "" ;
            
            document.getElementById("num2").value = "" ;
            document.getElementById("result").innerText="" ;
 }
    </script>
    
        
    </body>
    </html>
