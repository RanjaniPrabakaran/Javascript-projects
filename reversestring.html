<!DOCTYPE html>
<html>
    <head>
        <title>reverse string</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h3>reverse any given string</h3>

    <input type="text" id="textstring" class="form-control mb-3 w-25" placeholder="Enter string">
    <button class="btn btn-primary" onclick="reversestring()">reverse</button>

    <p id="result" class="mt-3"></p>

    <script>

        function reversestring() {

            let str = document.getElementById("textstring").value;

            if(str.trim()==="") {

                document.getElementById("result").innerText = "enter valid input";
                return;
            }

            let reversed = str.split("").reverse().join("");

            document.getElementById("result").innerText = "reversed :" + reversed;
        }
    </script>
</body>
</html>
