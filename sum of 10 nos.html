<!DOCTYPE html>
<html>
    <head>
        <title>sum of 10 numbers</title>
        
    </head>
<body>
    <script>

        let sum = 0;

        for( i=1 ; i<=10 ; i++) {

            let num = prompt("enter number" + i + ":");

            num = parseFloat(num);

            if(isNaN(num)){

                alert("Invalid input! enter valid number");
                i--;
            } else {
                sum+=num;
            }}
     alert("sum of numbers:" + sum);
        
    </script>
</body>
</html>
