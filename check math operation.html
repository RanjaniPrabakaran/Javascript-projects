<!DOCTYPE html>
<html>
    <head>
        <title>check math operation</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="p-4">
        <h3>checking math operation</h3>
        <input type="number" id="num1" class="form-control w-25 mb-2" placeholder="enter number 1">
        <input type="number" id="num2" class="form-control w-25 mb-2" placeholder="enter number 2">
        <input type="text" id="operator" class="form-control w-25 mb-2" placeholder="enter operator(+,-,*,/)">
        <button class="btn btn-primary" onclick="checkOperation()">calculate</button>

        <p id="result" class="mt-3"></p>

        <script>
            function checkOperation(){
                let a=parseFloat(document.getElementById("num1").value);
                let b=parseFloat(document.getElementById("num2").value);
                let op=(document.getElementById("operator").value);

                if(isNaN(a) || isNaN(b)) {
                    document.getElementById("result").innerText="enter valid numbers";
                    return;
                }
let result;
    
                  if(op === "+"){
                result = a+b;
                  }
                    else if(op === "-"){
                        result = a-b;
                    }else if(op === "*"){
                        result = a*b;
                    }else if(op === "/"){
                        if(b === 0) {
                            document.getElementById("result").innerText="cannot divide by zero";
                            return;
                        }
                        result= a/b;
                    }
                        else {
                        document.getElementById("result").innerText="invalid operator";
                        return;

                    } document.getElementById("result").innerText="result: " + result;

                }

        </script>
    </body>
    </html>
