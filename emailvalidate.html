<!DOCTYPE html>
<html>
    <head>
        <title>email validation</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="p-4">
        <h3>email validation</h3>
        <input type="text" id="emailid" class="form-control mt-3 w-35" placeholder="enter email id">
        <button class="btn btn-primary mt-3" onclick="checkvalidate()">validate</button>
        <p id="result" class="mt-3"></p>

        <script>

            function checkvalidate() {
                
                let email=document.getElementById("emailid").value;

                if(email.trim()==="") {

                document.getElementById("result").innerText="enter email";
                return;
                } 

                let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        
                if(pattern.test(email)) {
                
                    document.getElementById("result").innerText="email id is valid";

                }else {
                    document.getElementById("result").innerText="email id is INVALID"
                } }
                </script>
                </body>
</html>
