<!DOCTYPE html>
<html>
    <head>
        <title>evaluate date format</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="p-4">
        <h3>validate date format</h3>
        <input type="text" id="date" class="form-control w-25 mt-3" placeholder="enter date">
        <button class="btn btn-primary mt-3" onclick="identify()">identify</button>
        <p id="result" class="mt-3"></p>
<script>
    function identify() {
        let input=document.getElementById("date").value;

        if(input.trim()==="") {
            document.getElementById("result").innerText="enter valid date";
            return;
        }
        let pattern = /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$/;
                      

        if(!pattern.test(input)) {
            document.getElementById("result").innerText="Invalid format";
            return;
        } 

        let parts = input.split("/");
        let mm =  parseInt(parts[0]);
        let dd=parseInt(parts[1]);
        let yyyy=parseInt(parts[2]);

        let daysinmonth=new Date(yyyy,mm,0).getDate();

        if(dd > daysinmonth) {
            document.getElementById("result").innerText="invalid date";
        }else {
            document.getElementById("result").innerText="valid date";
        }
    }
</script>
</body>
</html>
